<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسکنر آفلاین QR - اسکرول‌دار</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #1e1e2f;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin: 0;
      /* حداکثر ارتفاع صفحه رو پر کنه */
      height: 100vh;
      box-sizing: border-box;
    }
    #video {
      width: 100%;
      max-width: 300px; /* کوچک‌تر کردم تا جا برای اسکرول باشه */
      border-radius: 12px;
      border: 3px solid #4fc3f7;
      margin: 10px auto;
      display: block;
    }
    .hidden-canvas {
      display: none;
    }
    .text-box {
      background: #2c2c3e;
      border-radius: 12px;
      padding: 15px;
      margin: 10px auto;
      max-width: 400px;
      width: 90%;
      max-height: 80px;        /* ارتفاع ثابت */
      overflow-y: auto;        /* اگه متن طولانی بود اسکرول بده */
      font-size: 1.2rem;
      word-break: break-word;
      border: 2px dashed #4fc3f7;
    }
    .list-container {
      max-width: 400px;
      width: 90%;
      margin: 10px auto;
      /* این بخش جدید ـه */
      max-height: 35vh;        /* ۳۵ درصد ارتفاع صفحه */
      overflow-y: auto;        /* اسکرول عمودی */
      text-align: right;
      background: #1a1a2e;      /* یه رنگ پس‌زمینه برای بهتر دیده شدن */
      border-radius: 12px;
      padding: 5px;
      border: 1px solid #4fc3f7;
    }
    .scanned-item {
      background: #3a3a52;
      padding: 10px 15px;
      margin: 6px 8px;
      border-radius: 8px;
      font-size: 0.95rem;
      border-right: 4px solid #4fc3f7;
      text-align: right;
      word-break: break-word;
    }
    button {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      border-radius: 30px;
      margin: 8px 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button.clear {
      background: #ff8a80;
    }
    #status {
      color: #b0bec5;
      margin: 5px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h2>📱 اسکنر آفلاین QR</h2>
  <p id="status">در حال دسترسی به دوربین...</p>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" class="hidden-canvas"></canvas>

  <div class="text-box" id="currentText">منتظر اولین اسکن...</div>

  <div>
    <button onclick="clearList()" class="clear">🧹 پاک کردن لیست</button>
    <button onclick="togglePause()">⏯️ توقف/ادامه</button>
  </div>

  <div class="list-container" id="list"></div>

  <!-- کتابخونه jsQR (برای آفلاین کامل، فایل رو دانلود کن و آدرس رو به ./jsQR.min.js تغییر بده) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    // اسکریپت مثل قبل کاملاً بدون تغییر
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const currentTextDiv = document.getElementById('currentText');
    const listDiv = document.getElementById('list');
    const status = document.getElementById('status');

    let scanning = true;
    let lastScanned = '';
    let scannedTexts = [];

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        video.setAttribute('playsinline', true);
        video.play();
        status.textContent = '✅ دوربین آماده است. QR را مقابل دوربین بگیر.';
        requestAnimationFrame(scanLoop);
      } catch (err) {
        status.textContent = '❌ دسترسی به دوربین ممکن نشد. (از لوکال‌هاست یا HTTPS استفاده کن)';
        console.error(err);
      }
    }

    function scanLoop() {
      if (!scanning) {
        requestAnimationFrame(scanLoop);
        return;
      }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "dontInvert",
        });
        if (code && code.data !== lastScanned) {
          const scannedText = code.data.trim();
          if (scannedText !== '') {
            handleNewScan(scannedText);
            lastScanned = scannedText;
            setTimeout(() => { lastScanned = ''; }, 1500);
          }
        }
      }
      requestAnimationFrame(scanLoop);
    }

    function handleNewScan(text) {
      currentTextDiv.textContent = text;
      scannedTexts.push(text);
      updateListUI();
      if (navigator.vibrate) navigator.vibrate(200);
    }

    function updateListUI() {
      listDiv.innerHTML = '';
      scannedTexts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'scanned-item';
        div.textContent = `${index + 1}. ${item}`;
        listDiv.appendChild(div);
      });
      // اسکرول خودکار به آخرین آیتم
      listDiv.scrollTop = listDiv.scrollHeight;
    }

    function clearList() {
      scannedTexts = [];
      currentTextDiv.textContent = 'منتظر اسکن جدید...';
      updateListUI();
    }

    function togglePause() {
      scanning = !scanning;
      status.textContent = scanning ? '🔍 در حال اسکن...' : '⏸️ اسکن متوقف شد.';
    }

    startCamera();
  </script>
</body>
</html>
