<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پل ماهواره‌ای QR - فرستنده و گیرنده</title>
  <style>
    body { font-family: Tahoma; background: #1a1a2e; color: white; text-align: center; padding: 15px; }
    button, select, input { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-family: inherit; }
    .section { background: #252545; border-radius: 16px; padding: 15px; margin: 20px auto; max-width: 500px; }
    canvas { border: 2px solid #4fc3f7; border-radius: 10px; margin: 10px; }
    video { width: 100%; max-width: 300px; border-radius: 10px; display: block; margin: 10px auto; }
    .hidden { display: none; }
    #status { color: #ccc; }
    .log { background: #0003; max-height: 100px; overflow-y: auto; text-align: right; padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>📡 پل ماهواره‌ای QR</h1>

  <!-- بخش فرستنده: فایل به QR پشت‌سرهم -->
  <div class="section">
    <h3>📤 فرستنده: فایل → QR (برای ضبط و پخش)</h3>
    <input type="file" id="fileInput">
    <br>
    <button onclick="startTransmit()">▶ شروع پخش QRها</button>
    <button onclick="stopTransmit()">⏹ توقف</button>
    <button onclick="downloadQRVideo()" style="background:#81c784;">⬇ دریافت ویدیوی QR</button>
    <canvas id="qrCanvas" width="400" height="400" class="hidden"></canvas>
    <video id="qrPreview" autoplay muted loop class="hidden"></video>
    <p id="txStatus">فایلی انتخاب نشده</p>
  </div>

  <!-- بخش گیرنده: اسکنر برای بازسازی فایل -->
  <div class="section">
    <h3>📥 گیرنده: اسکن از تلویزیون و بازسازی فایل</h3>
    <button onclick="startReceiver()">📷 شروع اسکن</button>
    <button onclick="stopReceiver()">⏹ توقف اسکن</button>
    <button onclick="downloadFile()" style="background:#ffb74d;" id="downloadBtn" disabled>💾 دانلود فایل بازسازی‌شده</button>
    <video id="rxVideo" autoplay playsinline></video>
    <canvas id="rxCanvas" class="hidden"></canvas>
    <div class="log" id="rxLog">وضعیت: آماده</div>
    <p id="rxProgress">۰ تکه دریافت شده</p>
  </div>

  <!-- کتابخانه‌ها -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <script>
    // ---------- فرستنده ----------
    let fileData = null;
    let chunks = [];
    let currentChunkIndex = 0;
    let txInterval = null;
    const CHUNK_SIZE = 2500; // هر QR تا 2953 بایت، ما کمی کمتر برای اطمینان
    const qrCanvas = document.getElementById('qrCanvas');
    const txStatus = document.getElementById('txStatus');

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        fileData = new Uint8Array(ev.target.result);
        const totalChunks = Math.ceil(fileData.length / CHUNK_SIZE);
        chunks = [];
        for (let i = 0; i < totalChunks; i++) {
          const start = i * CHUNK_SIZE;
          const end = Math.min(start + CHUNK_SIZE, fileData.length);
          const chunkData = fileData.slice(start, end);
          // تبدیل باینری به Base64 (برای جلوگیری از مشکل کاراکترهای غیرمجاز در QR)
          const base64 = arrayBufferToBase64(chunkData);
          // ایجاد بسته: شماره ترتیب، تعداد کل، و داده (با جداکننده '|')
          const packet = `${i+1}|${totalChunks}|${base64}`;
          chunks.push(packet);
        }
        txStatus.textContent = `فایل به ${chunks.length} تکه QR تقسیم شد. طول هر تکه بایت: ${CHUNK_SIZE}`;
        currentChunkIndex = 0;
      };
      reader.readAsArrayBuffer(file);
    });

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return window.btoa(binary);
    }

    async function showQR(index) {
      if (index >= chunks.length) {
        stopTransmit();
        txStatus.textContent = 'پخش تمام شد.';
        return;
      }
      const data = chunks[index];
      try {
        await QRCode.toCanvas(qrCanvas, data, {
          width: 400,
          errorCorrectionLevel: 'L',
          color: { dark: '#000', light: '#fff' }
        });
        qrCanvas.classList.remove('hidden');
        document.getElementById('qrPreview').classList.add('hidden');
      } catch (e) {
        console.error(e);
      }
    }

    function startTransmit() {
      if (!chunks.length) {
        txStatus.textContent = 'ابتدا فایل را انتخاب کنید.';
        return;
      }
      stopTransmit(); // پاک کردن قبلی
      showQR(currentChunkIndex);
      txInterval = setInterval(() => {
        currentChunkIndex++;
        if (currentChunkIndex >= chunks.length) {
          stopTransmit();
          txStatus.textContent = 'پخش تمام شد.';
        } else {
          showQR(currentChunkIndex);
        }
      }, 200); // هر ۲۰۰ میلی‌ثانیه یک QR (۵ فریم در ثانیه) - قابل تنظیم
      txStatus.textContent = 'در حال پخش...';
    }

    function stopTransmit() {
      if (txInterval) clearInterval(txInterval);
      txInterval = null;
      qrCanvas.classList.add('hidden');
    }

    // ساخت ویدیو از QRها (MediaRecorder)
    async function downloadQRVideo() {
      if (!chunks.length) {
        alert('فایلی بارگذاری نشده.');
        return;
      }
      stopTransmit();
      const canvas = qrCanvas;
      const stream = canvas.captureStream(5); // 5fps
      const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      const recordedChunks = [];
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'qr-broadcast.webm';
        a.click();
        URL.revokeObjectURL(url);
        txStatus.textContent = 'ویدیو دانلود شد. می‌توانید در شبکه پخش کنید.';
      };
      mediaRecorder.start();
      // پخش سریع همه QRها و سپس توقف
      currentChunkIndex = 0;
      await showQR(currentChunkIndex);
      const playAll = setInterval(async () => {
        currentChunkIndex++;
        if (currentChunkIndex >= chunks.length) {
          clearInterval(playAll);
          mediaRecorder.stop();
          return;
        }
        await showQR(currentChunkIndex);
      }, 200);
    }

    // ---------- گیرنده ----------
    let rxVideo, rxCanvas, rxStream, rxInterval, rxAnimation;
    let receivedChunks = {}; // key: index, value: base64 data
    let totalChunksExpected = null;
    let lastScannedPacket = '';

    async function startReceiver() {
      try {
        rxVideo = document.getElementById('rxVideo');
        rxCanvas = document.getElementById('rxCanvas');
        rxCanvas.classList.add('hidden');
        rxStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 } }
        });
        rxVideo.srcObject = rxStream;
        rxVideo.play();
        document.getElementById('rxLog').textContent = 'دوربین فعال شد. QR را مقابل دوربین بگیرید...';
        rxAnimation = requestAnimationFrame(scanLoopRX);
      } catch (e) {
        document.getElementById('rxLog').textContent = 'خطا در دسترسی به دوربین.';
      }
    }

    function stopReceiver() {
      if (rxStream) rxStream.getTracks().forEach(t => t.stop());
      if (rxAnimation) cancelAnimationFrame(rxAnimation);
      rxStream = null;
      rxAnimation = null;
    }

    function scanLoopRX() {
      if (!rxVideo || rxVideo.readyState !== rxVideo.HAVE_ENOUGH_DATA) {
        rxAnimation = requestAnimationFrame(scanLoopRX);
        return;
      }
      rxCanvas.width = rxVideo.videoWidth;
      rxCanvas.height = rxVideo.videoHeight;
      const ctx = rxCanvas.getContext('2d');
      ctx.drawImage(rxVideo, 0, 0);
      const imageData = ctx.getImageData(0, 0, rxCanvas.width, rxCanvas.height);
      const code = jsQR(imageData.data, rxCanvas.width, rxCanvas.height, {
        inversionAttempts: "attemptBoth",
      });
      if (code && code.data !== lastScannedPacket) {
        lastScannedPacket = code.data;
        processPacket(code.data);
      }
      rxAnimation = requestAnimationFrame(scanLoopRX);
    }

    function processPacket(data) {
      const parts = data.split('|');
      if (parts.length !== 3) return;
      const index = parseInt(parts[0]) - 1;
      const total = parseInt(parts[1]);
      const base64 = parts[2];
      if (isNaN(index) || isNaN(total) || index < 0 || total <= 0) return;

      if (totalChunksExpected === null) totalChunksExpected = total;
      if (index in receivedChunks) return; // تکراری

      receivedChunks[index] = base64;
      document.getElementById('rxLog').textContent = `تکه ${index+1} از ${total} دریافت شد.`;
      document.getElementById('rxProgress').textContent = `${Object.keys(receivedChunks).length} از ${total} تکه`;

      // اگر همه تکه‌ها جمع شد
      if (Object.keys(receivedChunks).length === totalChunksExpected) {
        document.getElementById('rxLog').textContent = 'همه تکه‌ها دریافت شدند!';
        document.getElementById('downloadBtn').disabled = false;
      }
    }

    function downloadFile() {
      if (!totalChunksExpected || Object.keys(receivedChunks).length < totalChunksExpected) {
        alert('هنوز همه تکه‌ها دریافت نشده‌اند.');
        return;
      }
      const orderedBase64 = [];
      for (let i = 0; i < totalChunksExpected; i++) {
        orderedBase64.push(receivedChunks[i] || '');
      }
      const fullBase64 = orderedBase64.join('');
      const byteString = atob(fullBase64);
      const bytes = new Uint8Array(byteString.length);
      for (let i = 0; i < byteString.length; i++) {
        bytes[i] = byteString.charCodeAt(i);
      }
      const blob = new Blob([bytes]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'reconstructed_file';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ریست دستی
    function resetReceiver() {
      receivedChunks = {};
      totalChunksExpected = null;
      lastScannedPacket = '';
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('rxProgress').textContent = '۰ تکه دریافت شده';
    }
  </script>
</body>
</html>
