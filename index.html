<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسکنر آفلاین QR - متن‌های پشت سر هم</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #1e1e2f;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    #video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 3px solid #4fc3f7;
      margin: 15px auto;
      display: block;
    }
    .hidden-canvas {
      display: none;
    }
    .text-box {
      background: #2c2c3e;
      border-radius: 12px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      min-height: 120px;
      font-size: 1.4rem;
      word-break: break-word;
      border: 2px dashed #4fc3f7;
    }
    .list-container {
      max-width: 400px;
      margin: 15px auto;
      text-align: right;
    }
    .scanned-item {
      background: #3a3a52;
      padding: 10px 15px;
      margin: 8px 0;
      border-radius: 8px;
      font-size: 1rem;
      border-right: 4px solid #4fc3f7;
    }
    button {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 30px;
      margin: 10px 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button.clear {
      background: #ff8a80;
    }
    #status {
      color: #b0bec5;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h2>📱 اسکنر آفلاین QR</h2>
  <p id="status">در حال دسترسی به دوربین...</p>
  <video id="video" autoplay playsinline></video>
  <!-- canvas مخفی برای تحلیل فریم‌ها -->
  <canvas id="canvas" class="hidden-canvas"></canvas>

  <div class="text-box" id="currentText">منتظر اولین اسکن...</div>

  <div>
    <button onclick="clearList()" class="clear">🧹 پاک کردن لیست</button>
    <button onclick="togglePause()">⏯️ توقف/ادامه</button>
  </div>

  <div class="list-container" id="list"></div>

  <!-- کتابخونه jsQR (لوکال یا از CDN - برای آفلاین کامل دانلودش کن و کنار فایل بذار) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <!-- برای آفلاین می‌تونی فایل رو دانلود کنی و آدرس رو به صورت محلی بدی، مثل: -->
  <!-- <script src="./jsQR.min.js"></script> -->

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const currentTextDiv = document.getElementById('currentText');
    const listDiv = document.getElementById('list');
    const status = document.getElementById('status');

    let scanning = true;       // آیا اسکن فعال باشه؟
    let lastScanned = '';      // آخرین متن اسکن‌شده (برای جلوگیری از تکرار پشت‌سرهم)
    let scannedTexts = [];     // آرایه‌ای از همهٔ متن‌های اسکن شده

    // شروع دوربین
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }  // دوربین پشت (موبایل)
        });
        video.srcObject = stream;
        video.setAttribute('playsinline', true);
        video.play();
        status.textContent = '✅ دوربین آماده است. QR را مقابل دوربین بگیر.';
        requestAnimationFrame(scanLoop);
      } catch (err) {
        status.textContent = '❌ دسترسی به دوربین ممکن نشد. مطمئن شو که از لوکال هاست یا HTTPS استفاده می‌کنی.';
        console.error(err);
      }
    }

    // حلقهٔ اسکن (هر فریم بررسی می‌شه)
    function scanLoop() {
      if (!scanning) {
        requestAnimationFrame(scanLoop);
        return;
      }

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // استفاده از jsQR برای رمزگشایی
        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "dontInvert",
        });

        if (code && code.data !== lastScanned) {
          // یه QR جدید پیدا شده
          const scannedText = code.data.trim();
          if (scannedText !== '') {
            handleNewScan(scannedText);
            lastScanned = scannedText;
            // یه مکث کوتاه برای جلوگیری از اسکن تکراری توی چند فریم
            setTimeout(() => { lastScanned = ''; }, 1500);
          }
        }
      }
      requestAnimationFrame(scanLoop);
    }

    // وقتی یه متن جدید اسکن میشه
    function handleNewScan(text) {
      // نمایش در باکس بالایی (آخرین متن اسکن شده)
      currentTextDiv.textContent = text;
      
      // اضافه کردن به لیست
      scannedTexts.push(text);
      updateListUI();

      // می‌تونی ویبره کنی (در صورت پشتیبانی)
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }
    }

    // بروزرسانی لیست در صفحه
    function updateListUI() {
      listDiv.innerHTML = '';
      scannedTexts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'scanned-item';
        div.textContent = `${index + 1}. ${item}`;
        listDiv.appendChild(div);
      });
    }

    // پاک کردن کل لیست
    function clearList() {
      scannedTexts = [];
      currentTextDiv.textContent = 'منتظر اسکن جدید...';
      updateListUI();
    }

    // توقف/ادامه اسکن
    function togglePause() {
      scanning = !scanning;
      status.textContent = scanning ? '🔍 در حال اسکن...' : '⏸️ اسکن متوقف شد.';
    }

    // اجرا
    startCamera();
  </script>
</body>
</html>
