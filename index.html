<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم تشخیص خواب راننده</title>
    <!-- لود کردن کتابخانه MediaPipe از طریق شبکه (نیاز به اینترنت دارد) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; }
        #video-container { position: relative; display: inline-block; margin-top: 20px; border: 2px solid #555; }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        video { transform: scaleX(-1); }
        #status { font-size: 24px; margin-top: 10px; font-weight: bold; }
        .alert { color: red; }
        .safe { color: green; }
        button { padding: 15px 30px; font-size: 18px; margin-top: 20px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 8px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>🚗 سیستم هشدار خواب آلودگی</h1>
    <button id="startBtn">شروع دوربین و تشخیص</button>
    <div id="video-container">
        <video id="webcam" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    <div id="status" class="safe">😊 چشم ها باز هستند (خواب نیستید)</div>

    <script>
        // متغیرها و تنظیمات
        let video = document.getElementById('webcam');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let statusDiv = document.getElementById('status');
        let faceLandmarker;
        let frameCounter = 0;
        let alarmPlaying = false;
        const EAR_THRESHOLD = 0.22; // آستانه بسته بودن چشم
        const CONSECUTIVE_FRAMES = 15; // تعداد فریم های پشت سر هم

        // نقاط چشم در مدل MediaPipe
        const LEFT_EYE = [33, 159, 133, 158, 153, 145];
        const RIGHT_EYE = [362, 387, 263, 386, 373, 374];

        // تابع محاسبه فاصله بین دو نقطه
        function distance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        // تابع محاسبه EAR
        function calculateEAR(landmarks, eyeIndices) {
            let p1 = landmarks[eyeIndices[0]];
            let p2 = landmarks[eyeIndices[1]];
            let p3 = landmarks[eyeIndices[2]];
            let p4 = landmarks[eyeIndices[3]];
            let p5 = landmarks[eyeIndices[4]];
            let p6 = landmarks[eyeIndices[5]];
            let ear = (distance(p2, p6) + distance(p3, p5)) / (2.0 * distance(p1, p4));
            return ear;
        }

        // پخش صدای هشدار با استفاده از مرورگر (بدون نیاز به فایل صوتی)
        function playAlarm() {
            if (alarmPlaying) return;
            alarmPlaying = true;
            const utterance = new SpeechSynthesisUtterance("توجه! خواب آلودگی! بیدار شوید!");
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            speechSynthesis.speak(utterance);
            // پخش بوق تکراری با استفاده از Web Audio API
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => { oscillator.stop(); alarmPlaying = false; }, 2000);
        }

        // راه‌اندازی MediaPipe
        async function initMediaPipe() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
                },
                outputFaceBlendshapes: false,
                runningMode: "VIDEO"
            });
            detectLoop(); // شروع حلقه تشخیص
        }

        // حلقه اصلی تشخیص (با استفاده از requestAnimationFrame)
        async function detectLoop() {
            if (!video.videoWidth) {
                requestAnimationFrame(detectLoop);
                return;
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const startTimeMs = performance.now();
            const results = faceLandmarker.detectForVideo(video, startTimeMs);

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                // رسم نقاط صورت
                ctx.fillStyle = "cyan";
                for (let i = 0; i < landmarks.length; i++) {
                    ctx.beginPath();
                    ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 1, 0, 2 * Math.PI);
                    ctx.fill();
                }

                // محاسبه EAR
                let leftEAR = calculateEAR(landmarks, LEFT_EYE);
                let rightEAR = calculateEAR(landmarks, RIGHT_EYE);
                let avgEAR = (leftEAR + rightEAR) / 2.0;

                if (avgEAR < EAR_THRESHOLD) {
                    frameCounter++;
                    if (frameCounter >= CONSECUTIVE_FRAMES) {
                        statusDiv.innerText = "🚨 خطر! خواب آلودگی! بیدار شوید!";
                        statusDiv.className = "alert";
                        playAlarm();
                    } else {
                        statusDiv.innerText = "⚠️ پلک زدن طولانی...";
                        statusDiv.className = "alert";
                    }
                } else {
                    frameCounter = 0;
                    statusDiv.innerText = "😊 چشم ها باز هستند (خواب نیستید)";
                    statusDiv.className = "safe";
                }
            } else {
                statusDiv.innerText = "👀 چهره شناسایی نشد. به دوربین نگاه کنید.";
                statusDiv.className = "safe";
            }
            requestAnimationFrame(detectLoop);
        }

        // راه‌اندازی دوربین
        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                document.getElementById('startBtn').style.display = 'none';
                await initMediaPipe();
            } catch (err) {
                alert("دوربین پیدا نشد یا دسترسی به آن رد شد! لطفا دسترسی دوربین را بدهید.");
                console.error(err);
            }
        });
    </script>
</body>
</html>
