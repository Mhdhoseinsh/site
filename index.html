<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم تشخیص خواب راننده (نسخه پایدار)</title>
    <!-- بارگذاری کتابخانه‌های سبک از طریق CDN که در ایران جواب می‌دهد -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; margin-top: 20px; border: 2px solid #555; width: 100%; max-width: 640px; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #status { font-size: 22px; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 10px; }
        .alert { background-color: #d32f2f; color: white; }
        .safe { background-color: #388e3c; color: white; }
        .warning { background-color: #f57c00; color: white; }
        button { padding: 15px 30px; font-size: 20px; margin-top: 20px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 8px; width: 90%; max-width: 300px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>🚗 سیستم هشدار خواب آلودگی</h1>
    <button id="startBtn">💪شروع دوربین و تشخیص</button>
    <div id="video-container">
        <video id="webcam" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="status" class="safe">😊 منتظر شروع دوربین...</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        let frameCounter = 0;
        let alarmPlaying = false;
        let audioCtx;

        // تنظیمات تشخیص چشم
        const EAR_THRESHOLD = 0.22; 
        const CONSECUTIVE_FRAMES = 12; 
        const LEFT_EYE = [33, 159, 133, 158, 153, 145];
        const RIGHT_EYE = [362, 387, 263, 386, 373, 374];

        function distance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        function calculateEAR(landmarks, eyeIndices) {
            let p1 = landmarks[eyeIndices[0]];
            let p2 = landmarks[eyeIndices[1]];
            let p3 = landmarks[eyeIndices[2]];
            let p4 = landmarks[eyeIndices[3]];
            let p5 = landmarks[eyeIndices[4]];
            let p6 = landmarks[eyeIndices[5]];
            let ear = (distance(p2, p6) + distance(p3, p5)) / (2.0 * distance(p1, p4));
            return ear;
        }

        // سیستم صدا (مخصوص گوشی که نیاز به کلیک کاربر دارد)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playAlarm() {
            if (alarmPlaying) return;
            alarmPlaying = true;
            initAudio(); // اطمینان از فعال شدن صدا

            // پخش صدای گفتار (توجه! خواب آلودگی!)
            const utterance = new SpeechSynthesisUtterance("توجه! خواب آلودگی! بیدار شوید!");
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.lang = 'fa-IR';
            speechSynthesis.speak(utterance);

            // پخش بوق هشدار دهنده
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.value = 800;
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.5);
            
            setTimeout(() => { alarmPlaying = false; }, 2000);
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // رسم نقاط صورت (فقط برای نمایش)
                ctx.fillStyle = "cyan";
                for (let i = 0; i < landmarks.length; i++) {
                    ctx.beginPath();
                    ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 1, 0, 2 * Math.PI);
                    ctx.fill();
                }

                // محاسبه EAR
                let leftEAR = calculateEAR(landmarks, LEFT_EYE);
                let rightEAR = calculateEAR(landmarks, RIGHT_EYE);
                let avgEAR = (leftEAR + rightEAR) / 2.0;

                // نمایش مقدار
                ctx.fillStyle = "yellow";
                ctx.font = "20px Arial";
                ctx.fillText("EAR: " + avgEAR.toFixed(2), 10, 30);

                if (avgEAR < EAR_THRESHOLD) {
                    frameCounter++;
                    if (frameCounter >= CONSECUTIVE_FRAMES) {
                        statusDiv.innerText = "🚨 خطر! خواب آلودگی! بیدار شوید!";
                        statusDiv.className = "alert";
                        playAlarm(); // صدای هشدار
                    } else {
                        statusDiv.innerText = "⚠️ پلک زدن طولانی...";
                        statusDiv.className = "warning";
                    }
                } else {
                    frameCounter = 0;
                    statusDiv.innerText = "😊 چشم ها باز هستند (خواب نیستید)";
                    statusDiv.className = "safe";
                }
            } else {
                statusDiv.innerText = "👀 چهره‌ای پیدا نشد. به دوربین نگاه کنید.";
                statusDiv.className = "warning";
            }
        }

        // راه‌اندازی
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.innerText = "در حال بارگذاری هوش مصنوعی... (کمی صبر کنید)";
            
            initAudio();

            // تنظیمات FaceMesh
            const faceMesh = new FaceMesh({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults(onResults);

            // راه‌اندازی دوربین
            const camera = new Camera(video, {
                onFrame: async () => {
                    try {
                        await faceMesh.send({image: video});
                    } catch (e) {
                        console.log(e);
                    }
                },
                width: 640,
                height: 480
            });

            try {
                await camera.start();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                startBtn.style.display = 'none';
                statusDiv.innerText = "😊 سیستم روشن است. چشم ها را ببندید.";
            } catch (err) {
                alert("دسترسی به دوربین رد شد! لطفا در تنظیمات مرورگر به این صفحه دسترسی دوربین را بدهید.");
                startBtn.disabled = false;
                startBtn.innerText = "شروع دوربین و تشخیص";
            }
        });
    </script>
</body>
</html>
