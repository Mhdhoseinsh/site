<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسکنر آفلاین QR - پایدار و با پشتیبانی از فایل</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #1e1e2f;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin: 0;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #video {
      width: 100%;
      max-width: 300px;
      border-radius: 12px;
      border: 3px solid #4fc3f7;
      margin: 10px auto;
      display: block;
    }
    .hidden-canvas {
      display: none;
    }
    .text-box {
      background: #2c2c3e;
      border-radius: 12px;
      padding: 15px;
      margin: 10px auto;
      max-width: 400px;
      width: 90%;
      max-height: 80px;
      overflow-y: auto;
      font-size: 1.2rem;
      word-break: break-word;
      border: 2px dashed #4fc3f7;
    }
    .list-container {
      max-width: 400px;
      width: 90%;
      margin: 10px auto;
      max-height: 30vh;          /* کمی فضا برای دکمه‌های جدید */
      overflow-y: auto;
      text-align: right;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 5px;
      border: 1px solid #4fc3f7;
    }
    .scanned-item {
      background: #3a3a52;
      padding: 10px 15px;
      margin: 6px 8px;
      border-radius: 8px;
      font-size: 0.95rem;
      border-right: 4px solid #4fc3f7;
      text-align: right;
      word-break: break-word;
    }
    button {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      border-radius: 30px;
      margin: 6px 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button.clear {
      background: #ff8a80;
    }
    button.export {
      background: #81c784;
    }
    button.import {
      background: #ffb74d;
    }
    #status {
      color: #b0bec5;
      margin: 5px 0;
      font-size: 0.9rem;
    }
    .file-input {
      display: none;
    }
  </style>
</head>
<body>
  <h2>📱 اسکنر آفلاین QR</h2>
  <p id="status">در حال دسترسی به دوربین...</p>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" class="hidden-canvas"></canvas>

  <div class="text-box" id="currentText">منتظر اولین اسکن...</div>

  <div>
    <button onclick="clearList()" class="clear">🧹 پاک کردن لیست</button>
    <button onclick="togglePause()">⏯️ توقف/ادامه</button>
    <button onclick="exportToFile()" class="export">📥 خروجی JSON</button>
    <button onclick="document.getElementById('importFile').click()" class="import">📤 ورودی از فایل</button>
    <input type="file" id="importFile" class="file-input" accept=".json" onchange="importFromFile(event)">
  </div>

  <div class="list-container" id="list"></div>

  <!-- کتابخونه jsQR (برای آفلاین فایل رو دانلود کن و لوکال کن) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const currentTextDiv = document.getElementById('currentText');
    const listDiv = document.getElementById('list');
    const status = document.getElementById('status');

    let scanning = true;
    let lastScanned = '';
    let scannedTexts = [];        // هر عنصر به صورت { text, time }
    let stream = null;            // برای قطع و وصل دوربین
    let animationId = null;

    // راه‌اندازی اولیه دوربین
    async function startCamera() {
      try {
        if (stream) {
          // اگر قبلاً استریمی هست، ابتدا قطع کن
          stopCamera();
        }
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        video.setAttribute('playsinline', true);
        await video.play();
        status.textContent = '✅ دوربین آماده است. QR را مقابل دوربین بگیر.';
        scanning = true;
        if (!animationId) {
          animationId = requestAnimationFrame(scanLoop);
        }
      } catch (err) {
        status.textContent = '❌ دسترسی به دوربین ممکن نشد. (از لوکال‌هاست یا HTTPS استفاده کن)';
        console.error(err);
      }
    }

    // قطع کامل دوربین
    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      video.srcObject = null;
    }

    // حلقهٔ اسکن
    function scanLoop() {
      if (!scanning) {
        animationId = requestAnimationFrame(scanLoop);
        return;
      }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "dontInvert",
        });
        if (code && code.data !== lastScanned) {
          const scannedText = code.data.trim();
          if (scannedText !== '') {
            handleNewScan(scannedText);
            lastScanned = scannedText;
            setTimeout(() => { lastScanned = ''; }, 1500);
          }
        }
      }
      animationId = requestAnimationFrame(scanLoop);
    }

    // وقتی متن جدید اسکن می‌شه
    function handleNewScan(text) {
      currentTextDiv.textContent = text;
      const now = new Date();
      scannedTexts.push({
        text: text,
        time: now.toLocaleString('fa-IR')
      });
      updateListUI();
      if (navigator.vibrate) navigator.vibrate(200);
    }

    // بروزرسانی لیست در صفحه
    function updateListUI() {
      listDiv.innerHTML = '';
      scannedTexts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'scanned-item';
        div.innerHTML = `${index + 1}. ${item.text} <br><small style="color:#aaa;">${item.time}</small>`;
        listDiv.appendChild(div);
      });
      listDiv.scrollTop = listDiv.scrollHeight;
    }

    // پاک کردن لیست
    function clearList() {
      scannedTexts = [];
      currentTextDiv.textContent = 'منتظر اسکن جدید...';
      updateListUI();
    }

    // توقف/ادامه اسکن
    function togglePause() {
      scanning = !scanning;
      status.textContent = scanning ? '🔍 در حال اسکن...' : '⏸️ اسکن متوقف شد.';
    }

    // خروجی گرفتن به صورت فایل JSON
    function exportToFile() {
      const dataStr = JSON.stringify(scannedTexts, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `qr-scans-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ورودی از فایل (آپلود JSON)
    function importFromFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            // اعتبارسنجی ساده
            scannedTexts = data.filter(item => item.text && item.time);
            updateListUI();
            currentTextDiv.textContent = scannedTexts.length ? scannedTexts[scannedTexts.length-1].text : 'منتظر اسکن جدید...';
            status.textContent = `📂 ${scannedTexts.length} رکورد از فایل بارگذاری شد.`;
          } else {
            alert('فرمت فایل معتبر نیست. آرایه‌ای از اسکن‌ها انتظار می‌رفت.');
          }
        } catch (error) {
          alert('خطا در خواندن فایل. مطمئن شو فایل JSON معتبر است.');
        }
      };
      reader.readAsText(file);
      // ریست کردن input برای آپلود دوبارهٔ همان فایل
      event.target.value = '';
    }

    // مدیریت خارج شدن از صفحه / برگشت
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // صفحه مخفی شده: توقف اسکن و قطع دوربین
        scanning = false;
        stopCamera();
        status.textContent = '⏸️ صفحه در پس‌زمینه است.';
      } else {
        // برگشت به صفحه: دوباره دوربین رو راه بنداز
        status.textContent = '🔄 در حال راه‌اندازی مجدد دوربین...';
        startCamera();
      }
    });

    // شروع اولیه
    startCamera();
  </script>
</body>
</html>
