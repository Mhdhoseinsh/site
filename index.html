<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسکنر QR ساده و تضمینی</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #121220;
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    .section {
      background: #1e1e32;
      border-radius: 20px;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border: 1px solid #4fc3f7;
    }
    textarea {
      width: 90%;
      height: 60px;
      margin: 10px 0;
      background: #2c2c42;
      color: #fff;
      border: 1px solid #4fc3f7;
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
    }
    button {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    canvas {
      display: block;
      margin: 10px auto;
      border: 2px solid #fff;
      border-radius: 16px;
    }
    video {
      width: 100%;
      max-width: 300px;
      border-radius: 16px;
      border: 3px solid #4fc3f7;
      margin: 10px auto;
    }
    .result-box {
      background: #2c2c42;
      border: 2px dashed #4fc3f7;
      border-radius: 12px;
      padding: 15px;
      margin: 10px auto;
      width: 90%;
      word-break: break-word;
      text-align: right;
      min-height: 40px;
    }
    .status {
      color: #b0bec5;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h2>📷 اسکنر QR کاملاً ساده</h2>

  <!-- بخش ساخت QR -->
  <div class="section">
    <h3>🔳 ساخت QR</h3>
    <textarea id="textToEncode" placeholder="متن فارسی یا انگلیسی..."></textarea>
    <br>
    <button onclick="generateQR()">تولید QR</button>
    <canvas id="qrCanvas" width="500" height="500" style="display:none;"></canvas>
  </div>

  <!-- بخش اسکن -->
  <div class="section">
    <h3>📥 اسکن با دوربین</h3>
    <button onclick="startScan()">▶ شروع اسکن</button>
    <button onclick="stopScan()">⏹ توقف</button>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>
    <div class="result-box" id="scannedText">متن اسکن‌شده اینجا نمایش داده می‌شود</div>
    <p class="status" id="status">آماده به کار</p>
  </div>

  <!-- کتابخانه‌های لازم -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    // ---------- ساخت QR ساده ----------
    async function generateQR() {
      const text = document.getElementById('textToEncode').value.trim();
      if (!text) return;
      const canvas = document.getElementById('qrCanvas');
      // پاک کردن و نمایش
      await QRCode.toCanvas(canvas, text, {
        width: 500,
        errorCorrectionLevel: 'L',    // حداکثر ظرفیت
        color: { dark: '#000000', light: '#ffffff' }
      });
      canvas.style.display = 'block';
    }

    // ---------- اسکن QR ----------
    let stream = null;
    let animationId = null;

    async function startScan() {
      // توقف هر اسکن قبلی
      stopScan();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.style.display = 'block';
        await video.play();
        document.getElementById('status').textContent = 'دوربین فعال شد. QR را مقابل لنز بگیرید.';
        scanLoop();
      } catch (err) {
        document.getElementById('status').textContent = '❌ خطا در دسترسی به دوربین. مطمئن شوید در localhost یا HTTPS هستید.';
      }
    }

    function stopScan() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      document.getElementById('video').style.display = 'none';
      document.getElementById('status').textContent = 'اسکن متوقف شد.';
    }

    function scanLoop() {
      const video = document.getElementById('video');
      const hiddenCanvas = document.getElementById('hiddenCanvas');
      if (!stream || video.readyState !== video.HAVE_ENOUGH_DATA) {
        animationId = requestAnimationFrame(scanLoop);
        return;
      }

      hiddenCanvas.width = video.videoWidth;
      hiddenCanvas.height = video.videoHeight;
      const ctx = hiddenCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);

      const code = jsQR(imageData.data, hiddenCanvas.width, hiddenCanvas.height, {
        inversionAttempts: "attemptBoth",
      });

      if (code) {
        // QR پیدا شد! متن را مستقیم نمایش بده
        document.getElementById('scannedText').textContent = code.data;
        document.getElementById('status').textContent = '✅ اسکن موفق!';
        // یک لرزش کوچک (در موبایل)
        if (navigator.vibrate) navigator.vibrate(200);
        // بعد از ۲ ثانیه دوباره آماده اسکن بعدی
        setTimeout(() => {
          document.getElementById('status').textContent = 'آماده برای اسکن بعدی...';
        }, 2000);
      }

      animationId = requestAnimationFrame(scanLoop);
    }

    // آزادسازی دوربین هنگام بستن صفحه
    window.addEventListener('beforeunload', stopScan);
  </script>
</body>
</html>
