<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسکنر آفلاین QR - قدرتمند برای متن‌های بلند</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Tahoma', sans-serif;
      background: #121220;
      color: #ffffff;
      text-align: center;
      padding: 15px;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      margin: 5px 0 0 0;
      font-size: 1.5rem;
      color: #4fc3f7;
    }
    #status {
      color: #b0bec5;
      margin: 5px 0 10px 0;
      font-size: 0.9rem;
    }
    video {
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      border: 3px solid #4fc3f7;
      margin-bottom: 10px;
      background: #000;
    }
    canvas {
      display: none;
    }
    .text-box {
      background: #1e1e32;
      border: 2px dashed #4fc3f7;
      border-radius: 12px;
      padding: 12px;
      margin: 5px auto;
      width: 90%;
      max-width: 400px;
      max-height: 90px;
      overflow-y: auto;
      font-size: 1.1rem;
      word-break: break-word;
      text-align: right;
      direction: rtl;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
    }
    button {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 10px 18px;
      font-size: 0.9rem;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      font-family: inherit;
    }
    button:active {
      transform: scale(0.95);
    }
    .clear-btn {
      background: #ff8a80;
    }
    .export-btn {
      background: #81c784;
    }
    .import-btn {
      background: #ffb74d;
    }
    .list-container {
      width: 90%;
      max-width: 400px;
      background: #1a1a2e;
      border: 1px solid #4fc3f7;
      border-radius: 12px;
      max-height: 35vh;
      overflow-y: auto;
      margin-top: 5px;
      padding: 8px;
      text-align: right;
    }
    .scanned-item {
      background: #2c2c42;
      padding: 10px 12px;
      margin: 6px 4px;
      border-radius: 8px;
      border-right: 4px solid #4fc3f7;
      font-size: 0.9rem;
      word-break: break-word;
    }
    .scanned-item small {
      color: #9e9e9e;
      display: block;
      margin-top: 4px;
    }
    input[type="file"] {
      display: none;
    }
    /* اسکرول سفارشی */
    .list-container::-webkit-scrollbar {
      width: 6px;
    }
    .list-container::-webkit-scrollbar-thumb {
      background: #4fc3f7;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h2>📱 اسکنر آفلاین QR</h2>
  <p id="status">در حال راه‌اندازی دوربین...</p>

  <!-- پخش زنده دوربین -->
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <!-- آخرین متن اسکن شده -->
  <div class="text-box" id="currentText">منتظر اولین اسکن...</div>

  <!-- دکمه‌ها -->
  <div class="btn-group">
    <button onclick="clearList()" class="clear-btn">🧹 پاک کردن لیست</button>
    <button onclick="togglePause()">⏯️ توقف / ادامه</button>
    <button onclick="exportToFile()" class="export-btn">📥 خروجی JSON</button>
    <button onclick="document.getElementById('importFile').click()" class="import-btn">📤 ورودی از فایل</button>
    <input type="file" id="importFile" accept=".json" onchange="importFromFile(event)">
  </div>

  <!-- لیست اسکن‌ها -->
  <div class="list-container" id="list"></div>

  <!-- کتابخانه jsQR (برای آفلاین کامل فایل را دانلود و آدرس را به ./jsQR.min.js تغییر دهید) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    // المان‌های DOM
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const currentTextDiv = document.getElementById('currentText');
    const listDiv = document.getElementById('list');
    const status = document.getElementById('status');

    // متغیرهای حالت
    let scanning = true;                // آیا اسکن فعال است؟
    let lastScanned = '';               // آخرین متن اسکن شده (برای جلوگیری از تکرار)
    let scannedTexts = [];              // آرایه اسکن‌ها (هر عضو: { text, time })
    let stream = null;                  // جریان دوربین
    let animationId = null;             // شماره فریم انیمیشن

    // ------------------------------------------------------------
    // ۱. مدیریت دوربین (با رزولوشن بالا)
    // ------------------------------------------------------------
    async function startCamera() {
      try {
        // اگر قبلاً دوربینی باز است ببند
        if (stream) stopCamera();

        // درخواست کیفیت HD برای خواندن QRهای بلند
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",   // دوربین پشت (موبایل)
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;
        video.setAttribute('playsinline', true);
        await video.play();
        status.textContent = '✅ دوربین HD آماده. QR را مقابل دوربین بگیرید.';
        scanning = true;
        if (!animationId) {
          animationId = requestAnimationFrame(scanLoop);
        }
      } catch (err) {
        // اگر HD در دسترس نبود، تنظیمات پیش‌فرض
        console.warn('دوربین HD در دسترس نیست، استفاده از حالت عادی:', err);
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
          });
          video.srcObject = stream;
          video.setAttribute('playsinline', true);
          await video.play();
          status.textContent = '✅ دوربین آماده (حالت عادی).';
          scanning = true;
          if (!animationId) animationId = requestAnimationFrame(scanLoop);
        } catch (e) {
          status.textContent = '❌ دسترسی به دوربین ممکن نشد. (از لوکال‌هاست یا HTTPS استفاده کنید)';
        }
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      video.srcObject = null;
    }

    // ------------------------------------------------------------
    // ۲. حلقه اسکن (با تنظیمات قوی برای QRهای بلند)
    // ------------------------------------------------------------
    function scanLoop() {
      if (!scanning) {
        animationId = requestAnimationFrame(scanLoop);
        return;
      }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // تلاش برای خواندن QR با وارونگی (حالت روشن/تاریک)
        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "attemptBoth",
        });

        if (code && code.data !== lastScanned) {
          const scannedText = code.data.trim();
          if (scannedText !== '') {
            handleNewScan(scannedText);
            lastScanned = scannedText;
            // جلوگیری از اسکن تکراری در ۱.۵ ثانیه
            setTimeout(() => { lastScanned = ''; }, 1500);
          }
        }
      }
      animationId = requestAnimationFrame(scanLoop);
    }

    // ------------------------------------------------------------
    // ۳. ذخیره و نمایش اسکن جدید
    // ------------------------------------------------------------
    function handleNewScan(text) {
      currentTextDiv.textContent = text;
      const now = new Date();
      scannedTexts.push({
        text: text,
        time: now.toLocaleString('fa-IR')
      });
      updateListUI();
      if (navigator.vibrate) navigator.vibrate(200);
    }

    function updateListUI() {
      listDiv.innerHTML = '';
      scannedTexts.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'scanned-item';
        div.innerHTML = `${index + 1}. ${item.text} <small>${item.time}</small>`;
        listDiv.appendChild(div);
      });
      listDiv.scrollTop = listDiv.scrollHeight; // اسکرول خودکار به انتها
    }

    // ------------------------------------------------------------
    // ۴. دکمه‌ها: پاک کردن، توقف، خروجی، ورودی
    // ------------------------------------------------------------
    function clearList() {
      scannedTexts = [];
      currentTextDiv.textContent = 'منتظر اسکن جدید...';
      updateListUI();
    }

    function togglePause() {
      scanning = !scanning;
      status.textContent = scanning ? '🔍 در حال اسکن...' : '⏸️ اسکن متوقف شد.';
    }

    function exportToFile() {
      if (scannedTexts.length === 0) {
        alert('هنوز متنی اسکن نشده است.');
        return;
      }
      const dataStr = JSON.stringify(scannedTexts, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `qr-scans-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      status.textContent = `📥 ${scannedTexts.length} رکورد خروجی گرفته شد.`;
    }

    function importFromFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            scannedTexts = data.filter(item => item.text && item.time);
            updateListUI();
            if (scannedTexts.length > 0) {
              currentTextDiv.textContent = scannedTexts[scannedTexts.length-1].text;
            } else {
              currentTextDiv.textContent = 'منتظر اسکن جدید...';
            }
            status.textContent = `📂 ${scannedTexts.length} رکورد از فایل بارگذاری شد.`;
          } else {
            alert('فرمت فایل معتبر نیست. آرایه‌ای از اسکن‌ها انتظار می‌رفت.');
          }
        } catch (error) {
          alert('خطا در خواندن فایل. مطمئن شوید فایل JSON صحیح است.');
        }
      };
      reader.readAsText(file);
      event.target.value = '';  // ریست input برای استفاده مجدد
    }

    // ------------------------------------------------------------
    // ۵. پایداری هنگام تغییر تب یا قفل صفحه
    // ------------------------------------------------------------
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // صفحه پنهان شد: توقف اسکن و قطع دوربین
        scanning = false;
        stopCamera();
        status.textContent = '⏸️ صفحه در پس‌زمینه، دوربین قطع شد.';
      } else {
        // برگشت به صفحه: راه‌اندازی مجدد
        status.textContent = '🔄 در حال راه‌اندازی مجدد دوربین...';
        startCamera();
      }
    });

    // شروع اولیه
    startCamera();
  </script>
</body>
</html>
